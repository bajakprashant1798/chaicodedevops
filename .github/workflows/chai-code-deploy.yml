name: Deploy NodeJs Code on Excloud

on:
  push:
    branches:
      main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: QEMU
        uses: docker/setup-qemu-action@v4

      - name: setup docker buildx  
        uses: docker/setup-buildx-action@v4

      - name: docker build and push
        run: |
          docker build -t bajakprashant/chaicode-node .
          docker push bajakprashant/chaicode-node
      
      - name: Deploy on Excloud
        uses: appleboy/ssh-action@v1.0.3 
        with:
          host: 210.79.128.243
          username: ubuntu
          key: ${{ secrets.CHAICODE_PRIVATE_KEY }}
          script: |
            # Stop and remove the existing container if it exists
            sudo docker stop chaicode-node || true
            sudo docker rm chaicode-node || true

            # Pull the fresh image from Docker Hub
            sudo docker pull bajakprashant/chaicode-node

            # Run the new container on port 80
            sudo docker run -d --name chaicode-node --restart unless-stopped -p 80:8000 bajakprashant/chaicode-node:latest
            
            # Clean up old/unused images
            sudo docker image prune -f
name: Deploy NodeJs Code on Excloud

on:
  push:
    branches:
      main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy on Excloud
        uses: appleboy/ssh-action@v1.0.3 
        with:
          host: 210.79.128.243
          username: ubuntu
          key: ${{ secrets.CHAICODE_PRIVATE_KEY }}
          script:
            cd /home/ubuntu/chaicodedevops
            git pull
            npm install
            pm2 restart 0
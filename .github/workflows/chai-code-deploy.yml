name: Deploy NodeJs Code on Excloud

on:
  push:
    branches:
      main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: QEMU
        uses: docker/setup-qemu-action@v4

      - name: setup docker buildx  
        uses: docker/setup-buildx-action@v4

      - name: docker build and push
        run: |
          docker build -t bajakprashant/chaicode-node .
          docker push bajakprashant/chaicode-node
      
      - name: Deploy on Excloud
        uses: appleboy/ssh-action@v1.0.3 
        with:
          host: 210.79.128.243
          username: ubuntu
          key: ${{ secrets.CHAICODE_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/chaicodedevops

            # git pull
            git pull origin main

            # down
            sudo docker compose down

            # pull image
            sudo docker compose pull

            # up
            sudo docker compose up -d

            # clean up the old and unused images
            sudo docker image prune -f